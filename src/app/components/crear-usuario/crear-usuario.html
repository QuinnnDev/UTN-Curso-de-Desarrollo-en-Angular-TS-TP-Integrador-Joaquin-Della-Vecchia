
<!-- Form group -->
<h1>User Registration</h1>
<form [formGroup]="register_form" (ngSubmit)="submitRegisterForm()">
  <div>
    <label for="nombre">Enter your name:</label>
    <input
      type="text"
      formControlName="nombre"
      id="nombre"
      [ngClass]="{
        'invalid-input':
          register_form.get('nombre')?.invalid && register_form.get('nombre')?.touched,
      }"
    />
    @if (getRegisterFormError('nombre')) {
      <span> {{ getRegisterFormError('nombre') }}</span>
    }
  </div>
  <div>
    <label for="email">Enter your email:</label>
    <input type="email" formControlName="email" id="email" />
    <span> {{ getRegisterFormError('email') }}</span>
  </div>
  <div>
    <label for="role">Enter your role:</label>
    <input type="text" formControlName="role" id="role" />
    <span> {{ getRegisterFormError('role') }}</span>
  </div>
  <div>
    <label for="date">Enter your birth date:</label>
    <input type="date" formControlName="date" id="date" />
    <span> {{ getRegisterFormError('date') }}</span>
  </div>
  <div>
    <label for="money">How much money do you have?:</label>
    <label class="testing-label">(for testing purposes only)</label>
    <input type="number" formControlName="money" id="money" />
    <span> {{ getRegisterFormError('email') }}</span>
  </div>
  <div>
    <label for="status">Appear as online?</label>
    <input type="checkbox" formControlName="status" id="status" />
    <span> {{ getRegisterFormError('status') }}</span>
  </div>
  <button type="submit">Submit</button>
</form>
